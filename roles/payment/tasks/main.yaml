  - name: create roboshop system user
    import_role:
      name: common
      tasks_from: app_setup  
  
  - name: installing python setup
    import_role:
      name: common
      tasks_from: python_setup

  - name: systemd setup
    import_role:
      name: common
      tasks_from: systemd_setup
      
  - name: enable and restart payment
    service:
      name: payment
      state: restarted
      enabled: yes
  