  - name: enable and install nodejs
    import_role:
      name: common
      tasks_from: nodejs_setup

  - name: app setup
    import_role:
      name: common
      tasks_from: app_setup 

  - name: copy and deamon reload
    import_role:
      name: common
      tasks_from: systemd_setup
      
  - name: enable and restart user
    service:
      name: user
      state: restarted
      enabled: yes